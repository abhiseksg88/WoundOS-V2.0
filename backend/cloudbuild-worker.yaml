# Cloud Build config for GPU Worker image (CUDA 12.2 + COLMAP + ML models)
# Uses high-CPU machine for faster build (COLMAP compilation + model downloads)
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile'
      - '-t'
      - '${_IMAGE_TAG}'
      - '.'
images:
  - '${_IMAGE_TAG}'
substitutions:
  _IMAGE_TAG: 'us-central1-docker.pkg.dev/${PROJECT_ID}/woundos/worker:latest'
timeout: 3600s
options:
  machineType: 'E2_HIGHCPU_32'
  logging: CLOUD_LOGGING_ONLY
  diskSizeGb: 200
